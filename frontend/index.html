<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Species Showcase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="header-icon">🌳</span>
      <h1>Tree Species Showcase</h1>
      <p class="header-subtitle">Explore the diversity of trees from around the world</p>
    </div>
  </header>

  <main>
    <section class="species-section" aria-labelledby="species-heading">
      <h2 id="species-heading" class="section-title">Featured Tree Species</h2>
      <p class="section-description">Browse and learn about different tree types — from majestic giants to delicate flowering trees.</p>
      <div class="species-grid" id="speciesGrid">
        <!-- Cards injected by script.js -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2024 Tree Species Showcase</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
