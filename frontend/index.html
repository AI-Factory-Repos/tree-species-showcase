<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Species Showcase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">🌳 Tree Species Showcase</h1>
      <p class="site-subtitle">Explore the beauty and diversity of trees from around the world</p>
      <nav class="site-nav">
        <a href="#species">Species</a>
        <a href="#gallery">Gallery</a>
      </nav>
    </div>
  </header>

  <!-- Species Cards Section -->
  <section id="species" class="section">
    <div class="container">
      <h2 class="section-title">Featured Species</h2>
      <div class="species-grid" id="speciesGrid">
        <!-- Populated by script.js -->
      </div>
    </div>
  </section>

  <!-- Photo Gallery Section -->
  <section id="gallery" class="section gallery-section">
    <div class="container">
      <h2 class="section-title">Photo Gallery</h2>
      <p class="section-desc">Click any photo to explore full-size tree photography.</p>
      <div class="gallery-grid" id="galleryGrid">
        <!-- Populated by script.js -->
      </div>
    </div>
  </section>

  <!-- Lightbox Modal -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo lightbox" hidden>
    <div class="lightbox-overlay" id="lightboxOverlay"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close lightbox">&times;</button>
      <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous photo">&#8249;</button>
      <div class="lightbox-img-wrap">
        <img class="lightbox-img" id="lightboxImg" src="" alt="" />
        <div class="lightbox-caption" id="lightboxCaption"></div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
      </div>
      <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next photo">&#8250;</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2024 Tree Species Showcase. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
